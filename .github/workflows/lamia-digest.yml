name: Lamia Municipality Digest

on:
  schedule:
    - cron: '30 7 5 * *'      # 07:30 UTC on the 5th day of each month
  workflow_dispatch:

permissions:
  contents: read


jobs:
  lamia-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Sanity check (syntax/indent)
        run: git ls-files '*.py' | xargs python -m py_compile

      - name: Build Lamia Municipality digest
        run: python src/lamia_digest.py --verbose

      - name: Upload Lamia artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lamia-digest-artifacts
          path: artifacts/lamia/
